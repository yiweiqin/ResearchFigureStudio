name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Compile package and bundled scripts
        run: |
          python -m compileall -q rfs
          python -m py_compile skills/research-figure-studio/scripts/validate_framework_outputs.py
          python -m py_compile skills/research-figure-studio/scripts/estimate_asset_fill.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -q
      - name: Check bundled skill metadata
        shell: python
        run: |
          from pathlib import Path
          skill = Path('skills/research-figure-studio/SKILL.md')
          text = skill.read_text(encoding='utf-8')
          assert text.startswith('---'), 'SKILL.md must start with YAML frontmatter'
          assert 'name: research-figure-studio' in text
          assert 'description:' in text
